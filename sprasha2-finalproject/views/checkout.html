<!DOCTYPE html>
<html lang=\"en\">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Shreya Prashantha">
    <meta name="description" content="MonoMuse ticket checkout">
    <title>MonoMuse | Checkout</title>
    <link rel="stylesheet" href="../static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- External library: jQuery (https://jquery.com/) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="../static/script.js" defer></script>
</head>
<body onload="addYear()">
    <div class="container">
    <header class="header">
        <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">
        
    
        <nav class="nav_bar">
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a href="buytickets.html">Tickets</a>
                <a href="javascript:void(0);" class="icon" onclick="toggleNav()">&#9776;</a>
    </nav>
    </header>
    <main class="main">
        <h1>Ticket Checkout</h1>
        <form id="checkoutForm" novalidate>
            <div class="form-row">
                <label for="visitDate">Visit Date (required)</label>
                <input type="date" id="visitDate" name="visitDate" required>
                <span class="error" id="visitDateError"></span>
            </div>
            <div class="form-row">
                <label for="ticketType">Ticket Type (required)</label>
                <select id="ticketType" name="ticketType" required>
                    <option value="">Select a ticket type</option>
                    <option value="general">General</option>
                    <option value="student">Student</option>
                    <option value="member">Member</option>
                </select>
                <span class="error" id="ticketTypeError"></span>
            </div>
            <div class="form-row">
                <label for="ticketQuantity">Ticket Quantity (1–10)</label>
                <input type="number" id="ticketQuantity" name="ticketQuantity" min="1" max="10" required>
                <span class="error" id="ticketQuantityError"></span>
            </div>
            <div class="form-row">
                <label for="email">Email (required)</label>
                <input type="email" id="email" name="email" required>
                <span class="error" id="emailError"></span>
            </div>
            <div class="form-row">
                <label for="zip">Zip Code (optional, 5 digits)</label>
                <input type="text" id="zip" name="zip" maxlength="5">
                <span class="error" id="zipError"></span>
            </div>
            <div class="form-row">
                <label>
                    <input type="checkbox" id="mailingList" name="mailingList">
                    Join our mailing list
                </label>
            </div>
            <p class="total-line">Total: $<span id="totalPrice">0</span></p>
            <button class="button" type="submit">Place Order</button>
            <span class="error" id="formError"></span>
        </form>
    </main>
    <figure class="main_figure main_img"></figure>
    <footer class="footer">
            <p id="copyYear"></p>
            <p>&copy; MonoMuse. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
